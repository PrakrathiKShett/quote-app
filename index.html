<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DQuotes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="phone">

        <div class="header">
            <h1>DQUOTES</h1>
        </div>

        <div class="quote-box">
            <p id="quote">Click below to get a quote</p>
        </div>

        <div class="buttons">
            <button onclick="newQuote()">New Quote</button>
            <button onclick="shareQuote()">Share</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
